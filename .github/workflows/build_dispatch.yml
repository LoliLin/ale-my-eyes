name: Build Dispatch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libspeechd-dev libasound2-dev libfontconfig-dev libpipewire-0.3-dev libwayland-dev libxrandr-dev libdbus-1-dev libegl-dev libgbm-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check --workspace

  build-windows:
    name: Build Windows executable
    needs: check
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: |
          cargo build --release -p ale-gui
          cp target/release/ale-gui.exe ale-my-eyes-windows.exe

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: ale-my-eyes-windows
          path: ale-my-eyes-windows.exe

  build-linux:
    name: Build Ubuntu deb
    needs: check
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y libspeechd-dev libasound2-dev libfontconfig-dev libpipewire-0.3-dev libwayland-dev libxrandr-dev libdbus-1-dev libegl-dev libgbm-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Build
        run: cargo build --release -p ale-cli -p ale-gui

      - name: Create deb package
        run: |
          PACKAGE_ROOT="dist/deb/ale-my-eyes"
          mkdir -p "${PACKAGE_ROOT}/DEBIAN" "${PACKAGE_ROOT}/usr/bin"
          cp target/release/ale-cli "${PACKAGE_ROOT}/usr/bin/"
          cp target/release/ale-gui "${PACKAGE_ROOT}/usr/bin/"
          cat > "${PACKAGE_ROOT}/DEBIAN/control" <<'EOF'
          Package: ale-my-eyes
          Version: 0.1.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Risaly Noroki Dev Club <erika@risnordev.org>
          Description: Intelligent accessibility assistant
          EOF
          dpkg-deb --build "${PACKAGE_ROOT}" ale-my-eyes_0.1.0_amd64.deb

      - name: Upload Ubuntu deb
        uses: actions/upload-artifact@v4
        with:
          name: ale-my-eyes-linux
          path: ale-my-eyes_0.1.0_amd64.deb

  build-android:
    name: Build Android package
    needs: check
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi

      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Install Android NDK
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"

      - name: Build
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
        run: |
          cargo apk build -p ale-gui --target aarch64-linux-android --lib --release
          cp target/aarch64-linux-android/release/apk/ale-gui.apk ale-my-eyes-android.apk

      - name: Upload Android apk
        uses: actions/upload-artifact@v4
        with:
          name: ale-my-eyes-android
          path: ale-my-eyes-android.apk

