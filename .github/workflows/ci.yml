name: Ale, My Eyes! CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. 基础代码规范检查 (代码格式 + 静态分析)
  lint:
    name: Code Quality (Fmt & Clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libspeechd-dev libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # 2. Linux 平台构建与测试
  build-linux:
    name: Linux Build & Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libspeechd-dev libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Run Tests
        run: cargo test --verbose

      - name: Build via Script
        run: |
          chmod +x ./scripts/package-linux.sh
          ./scripts/package-linux.sh

      # 【新增】上传 Linux 产物 (README 中定义的 ale-my-eyes-linux.tar.gz)
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ale-my-eyes-linux
          path: |
            *.tar.gz
            dist/*.tar.gz
          if-no-files-found: warn

  # 3. Windows 平台构建
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build via Script
        shell: bash
        run: |
          chmod +x ./scripts/package-windows.sh
          ./scripts/package-windows.sh

      # 【新增】上传 Windows 产物 (README 中定义的 ale-my-eyes-windows.zip)
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ale-my-eyes-windows
          path: |
            *.zip
            dist/*.zip
          if-no-files-found: warn

  # 4. Android 平台构建
  build-android:
    name: Android Cross-Compile
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        
      - name: Install NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install Rust toolchain & Targets
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android Targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build via Script
        run: |
          chmod +x ./scripts/package-android.sh
          ./scripts/package-android.sh

      # 【新增】上传 Android 产物 (README 中定义的 ale-my-eyes-android.apk)
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ale-my-eyes-android
          path: |
            **/*.apk
          if-no-files-found: warn
